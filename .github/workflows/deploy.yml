name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            admin/package-lock.json

      - name: Install worker dependencies
        run: npm ci

      - name: Install admin dependencies
        run: npm --prefix admin install

      - name: Validate required secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
          CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_KV_PREVIEW_ID: ${{ secrets.CF_KV_PREVIEW_ID }}
          CF_ADMIN_TOKEN: ${{ secrets.CF_ADMIN_TOKEN }}
        run: |
          missing=()
          for name in \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            CF_WORKER_NAME \
            CF_R2_BUCKET \
            CF_KV_NAMESPACE_ID \
            CF_KV_PREVIEW_ID \
            CF_ADMIN_TOKEN
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Secrets:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Generate production Wrangler config
        env:
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
          CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_KV_PREVIEW_ID: ${{ secrets.CF_KV_PREVIEW_ID }}
        run: |
          node -e '
            const fs = require("fs");
            const config = JSON.parse(fs.readFileSync("wrangler.jsonc", "utf8"));
            config.name = process.env.CF_WORKER_NAME;
            config.r2_buckets = [
              {
                binding: "WEBDAV_BUCKET",
                bucket_name: process.env.CF_R2_BUCKET,
              },
            ];
            config.kv_namespaces = [
              {
                binding: "WEBDAV_CONFIG",
                id: process.env.CF_KV_NAMESPACE_ID,
                preview_id: process.env.CF_KV_PREVIEW_ID,
              },
            ];
            fs.writeFileSync("wrangler.prod.jsonc", JSON.stringify(config, null, 2) + "\n");
          '

      - name: Generate deployment secrets file
        env:
          CF_ADMIN_TOKEN: ${{ secrets.CF_ADMIN_TOKEN }}
        run: |
          node -e '
            const fs = require("fs");
            fs.writeFileSync(
              "wrangler.secrets.json",
              JSON.stringify({ ADMIN_TOKEN: process.env.CF_ADMIN_TOKEN }, null, 2) + "\n"
            );
          '

      - name: Validate production deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm run test
          npm run typecheck
          npx wrangler deploy --dry-run -c ./wrangler.prod.jsonc --secrets-file ./wrangler.secrets.json

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy -c ./wrangler.prod.jsonc --secrets-file ./wrangler.secrets.json
